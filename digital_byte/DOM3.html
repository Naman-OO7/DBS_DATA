    let btn9 = document.getElementById("btn9"); // btn9 to access btn9 id
    let div_color = document.getElementById("div_color"); // main div id.
    let clickTimer = null; //to make difference btw single and dbl click.


function resetDiv() {
    //works as a reset option so that innerhtml content and background image value can become none again
    div_color.innerHTML = ""; // inner html bcoz of video tag.
    div_color.style.backgroundImage = "none"; // to make backgroundimage value=none
}

// 1. Handle Clicks (Separating Single and Double Click)
btn9.addEventListener("click", (e) => { //event listener to add an event on button so that it can perform certain action/properities mentioned inside the arrow function inside the listener.
    if (clickTimer) { //to separate single and dbl click time, it fires (if statement) only when (clicktimer=1) value.
        clearTimeout(clickTimer); // clearTimeout kills the entire code of single click code if user do double click.
        clickTimer = null; // to give clicktimer=0 value.
        return; // Skip single click logic if it's a double click
    }

    clickTimer = setTimeout(() => { // setTimeout forces the browser to wait for 250 milliseconds so that the browser doesn't trigger the 
                                    // single click function instantly and wait to see that either the user is doing single click or double click.
        // Single Left Click Action
        resetDiv(); //works as a reset option so that innerhtml content and background image value can become none again
        //Properities of bacjground image.
        div_color.style.backgroundImage = "url('./media/laddu.jpg')";
        div_color.style.backgroundRepeat = "no-repeat";
        div_color.style.backgroundPosition = "center";
        div_color.style.backgroundSize = "contain";
        clickTimer = null; // clicktTimer=0.
    }, 250); // 250ms delay gives the user time to double-click
});

// 2. Handle Double Click
btn9.addEventListener("dblclick", () => { 
    resetDiv(); //works as a reset option so that innerhtml content and background image value can become none again
    div_color.style.backgroundImage = "url('./media/barfi.jpg')"; // background image from media folder.
    div_color.style.backgroundRepeat = "no-repeat"; // no repeat-> single pic on the whole div section. 
    div_color.style.backgroundPosition = "center"; // backgrnd position center.
    div_color.style.backgroundSize = "contain";// backgrnd size whole div.
});

// 3. Handle Right Click (Context Menu) 
btn9.addEventListener("contextmenu", (e) => { // left click action
    e.preventDefault(); // Prevents the default browser right-click menu
    resetDiv(); //works as a reset option so that innerhtml content and background image value can become none again
    div_color.innerHTML ="<video src='./media/MarvelxDC_v1.mp4' muted controls autoplay loop></video>"; // video tag to access video inside the div tag.
    //innerHTML forces the video tag/ any tag of html to fire/ used inside JS.
});
