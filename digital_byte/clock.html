<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="flex min-h-screen items-center justify-center bg-slate-950 font-sans p-6 overflow-hidden">

    <!-- The styled wrapper box -->
    <div class="flex flex-col items-center gap-6 rounded-3xl border border-white bg-white p-12 shadow-2xl backdrop-blur-xl ring-2 ring-purple-500">
        
        <!-- The Main Clock (Given IDs so JS can find them easily) -->
        <h1 id="main-clock" class="text-7xl font-extrabold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-white to-pink-500 drop-shadow-[0_0_20px_rgba(6,182,212,0.5)] tabular-nums"></h1>
        
        <!-- The Reflection Clock -->
        <h1 id="reflect-clock" class="text-4xl font-bold tracking-widest text-white border-t border-white pt-4 w-full text-center tabular-nums blur-[1px]"></h1>
        
    </div> 
    
    <script>
        // Clock using date object and setInterval function to update the time every second.
        let div = document.createElement('div');
        let h1 = document.createElement('h1');
        let h2 = document.createElement('h1');

        function clock() {
            let time = new Date(); // new is a keyword called constructor used to create an instance/ of the date object.
            let hours = String(time.getHours()).padStart(2, '0');
            console.log(typeof(hours));
            let minutes = String(time.getMinutes()).padStart(2, '0');
            let seconds = String(time.getSeconds()).padStart(2, '0');
            console.log(typeof(minutes));
            console.log(typeof(seconds));

            h1.innerHTML = `${hours}:${minutes}:${seconds}`;
            h2.innerHTML = `${hours}:${minutes}:${seconds}`;
            div.appendChild(h2);
            document.body.appendChild(div);
        }

        div.appendChild(h1);
        document.body.appendChild(div);
        div.appendChild(h2);
        document.body.appendChild(div);
        clock();
        setInterval(clock, 1000);
    </script>
</body>
</html>
