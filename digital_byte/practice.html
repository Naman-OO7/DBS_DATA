<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <main class="flex items-center justify-center">
        <div id="div1" class="flex h-[600px] w-[600px] items-center justify-center bg-slate-300 border-4 border-black rounded-xl">

        </div>

    </main>
    <script>
        let div1=document.getElementById("div1");
        let h1=document.createElement("h1");
        h1.innerHTML="This is  first h1 tag!!";
        h1.style.color="red";
        div1.appendChild(h1);

        let h2=document.createElement("h1");
        h2.innerHTML="This is second h1 tag!!";
        h2.style.color="yellow";
        div1.appendChild(h2);



    </script>
</body>
</html>
